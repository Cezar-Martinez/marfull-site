<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARFULL Engenharia - Bem-vindo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    }
  </style>
</head>
<body class="font-sans text-white min-h-screen flex items-center justify-center">
  <div class="container mx-auto px-6 py-12 text-center max-w-2xl">
    
    <!-- Logo -->
    <div class="mb-12">
      <img src="imagem/LOGO1.png" alt="Logo MARFULL Engenharia" 
           class="mx-auto h-24 w-auto drop-shadow-lg">
    </div>

    <h1 class="text-4xl md:text-5xl font-bold mb-4">
      Bem-vindo à MARFULL Engenharia
    </h1>
    
    <p class="text-xl md:text-2xl text-blue-100 mb-12">
      Escolha como deseja continuar:
    </p>

    <!-- Duas opções principais -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-xl mx-auto">
      
      <!-- Botão Site Principal -->
      <a href="home.html" 
         class="group bg-white text-blue-700 hover:bg-blue-50 transition-all duration-300 
                rounded-2xl p-8 shadow-xl hover:shadow-2xl flex flex-col items-center">
        <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
          🏠
        </div>
        <h2 class="text-2xl font-semibold mb-3">Entrar no Site</h2>
        <p class="text-blue-600 text-center">
          Conheça nossos serviços de elétrica residencial, automação industrial e IoT
        </p>
      </a>

      <!-- Botão Política de Privacidade -->
      <a href="politica-de-privacidade.html" 
         class="group bg-white/10 hover:bg-white/20 backdrop-blur-sm border border-white/30 
                transition-all duration-300 rounded-2xl p-8 flex flex-col items-center">
        <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
          📜
        </div>
        <h2 class="text-2xl font-semibold mb-3">Política de Privacidade</h2>
        <p class="text-blue-100 text-center">
          Saiba como tratamos seus dados pessoais
        </p>
      </a>

    </div>

    <p class="mt-16 text-sm text-blue-200">
      © 2025 MARFULL ENGENHARIA • Todos os direitos reservados
    </p>
  </div>
</body>
</html>
